<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hollis Academy | Interactive AI Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans">

    <header class="border-b border-slate-800 p-6 bg-[#1e293b]">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black tracking-tighter text-white">HOLLIS <span class="text-yellow-400">ACADEMY</span></h1>
            <div class="flex gap-4">
                <span class="bg-green-500/10 text-green-400 px-3 py-1 rounded-full text-xs font-bold border border-green-500/20">AI LIVE</span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <section class="space-y-6">
            <div class="bg-slate-800/50 p-8 rounded-3xl border border-slate-700 shadow-xl">
                <h3 class="text-xl font-bold mb-4 text-yellow-400">Detective Quest: Hallucination Check</h3>
                <p class="text-slate-400 mb-6">Can you spot the lie generated by the AI?</p>
                
                <div class="space-y-3" id="quiz-container">
                    <button onclick="checkAnswer(1)" class="w-full text-left p-4 rounded-xl border border-slate-600 hover:bg-slate-700 transition-all">1. Penguins can fly as high as airplanes.</button>
                    <button onclick="checkAnswer(2)" class="w-full text-left p-4 rounded-xl border border-slate-600 hover:bg-slate-700 transition-all">2. A group of owls is called a parliament.</button>
                    <button onclick="checkAnswer(3)" class="w-full text-left p-4 rounded-xl border border-slate-600 hover:bg-slate-700 transition-all">3. Venus is the hottest planet in our solar system.</button>
                </div>
                <div id="quiz-feedback" class="mt-4 p-4 rounded-xl hidden"></div>
            </div>
        </section>

        <section class="flex flex-col h-[500px] bg-slate-800 rounded-3xl border border-slate-700 shadow-2xl overflow-hidden">
            <div class="p-4 bg-slate-900/50 border-b border-slate-700">
                <h3 class="font-bold text-white">Hollis Academy AI Lab</h3>
            </div>
            
            <div id="chat-display" class="flex-1 overflow-y-auto p-6 space-y-4">
                <div class="bg-blue-500/10 text-blue-200 p-3 rounded-2xl rounded-tl-none mr-8">
                    Hello! I am the Hollis Academy AI. Ask me anything about your lessons!
                </div>
            </div>

            <div class="p-4 bg-slate-900/50 flex gap-2">
                <input type="text" id="user-input" placeholder="Ask a question..." class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-2 outline-none focus:border-yellow-400">
                <button id="send-btn" class="bg-yellow-400 text-black px-6 py-2 rounded-xl font-bold hover:bg-yellow-300 transition-colors">Run</button>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
